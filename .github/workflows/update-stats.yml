name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *" # 每天凌晨3点自动更新
  workflow_dispatch: # 允许手动点击运行

# 确保 Action 有权限把生成的图片推送到你的仓库
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create profile directory
        run: mkdir -p profile

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=HugoPhi&show_icons=true&hide_border=true&theme=ambient_gradient&rank_icon=github
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate langs card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs  # 修正这里：必须是 top-langs
          options: username=HugoPhi&hide=vim%20script,jupyter%20notebook,lua,HTML&show_icons=true&layout=donut&hide_border=true&theme=ambient_gradient
          path: profile/langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
